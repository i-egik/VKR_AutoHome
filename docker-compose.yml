services:

  # Эмулятор Modbus TCP (порт 502)
  modbus-emulator:
    image: oitc/modbus-server
    ports:
      - "5020:5020"
    restart: unless-stopped

  # Основной сервис: 2 устройства зарегистрированы (Modbus TCP + File)
  house-main:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - house-main-data:/data
      - ./config:/app/config:ro
      - ./scripts:/app/scripts:ro
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/app/config/application-main.yaml
      DB_PATH: /data/house-main.db
      DB_INIT_SQL: /app/scripts/init-main.sql
    depends_on:
      - modbus-emulator
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Второстепенный сервис: 1 устройство, подключается к основному как EXTERNAL_REST-подсистема
  house-secondary:
    build: .
    ports:
      - "8081:8081"
    volumes:
      - house-secondary-data:/data
      - ./config:/app/config:ro
      - ./scripts:/app/scripts:ro
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/app/config/application-secondary.yaml
      DB_PATH: /data/house-secondary.db
      DB_INIT_SQL: /app/scripts/init-secondary.sql
    restart: unless-stopped

volumes:
  house-main-data:
  house-secondary-data:
